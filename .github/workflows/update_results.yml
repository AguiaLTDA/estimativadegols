name: Update World Cup Dashboard

on:
  push:
    paths:
      - 'copa_2026_real_results.json'
      - 'data_pipeline.py'
      - 'generate_dashboard.py'
  workflow_dispatch: # Allows manual run from GitHub Web UI

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Data Pipeline
        run: python data_pipeline.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html world_cup_2026.db group_stage_simulations.json world_cup_2026_teams.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard and database [skip ci]" && git push)
